
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMS Project</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/static/core/css/style.css" rel="stylesheet">
    
    <!-- Select2 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" rel="stylesheet" />

    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: bold; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; font-size: 1.5rem; }
        
        /* Deep Professional Blue for Navbar */
        .bg-navbar { background: linear-gradient(to right, #141e30, #243b55); color: white; }
        
        /* Vibrant Highlight for Active Forms */
        .bg-form-header { background: linear-gradient(to right, #4776e6, #8e54e9); color: white; }

        /* Icon accent color */
        .navbar-brand i { font-size: 1.8rem; color: #ffd700; /* Gold */ }
        
        .card { border: none; box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15); margin-bottom: 20px; }
        .card-header { border-bottom: none; }
        
        /* Fix Dropdown z-index overlapping with sticky headers */
        .dropdown-menu { z-index: 2000; }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    

    <!-- Messages Block (Toasts) -->
    <div aria-live="polite" aria-atomic="true" class="position-relative">
        <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1055;">
            
        </div>
    </div>

    <!-- Main Content -->
    <div class="container-fluid">
        
<div class="row mb-4">
    <div class="col-md-8">
        <h2 class="text-primary"><i class="bi bi-box-seam me-2"></i>Current Stock (All Item Balance)</h2>
    </div>
    <div class="col-md-4 text-end">
        <button onclick="window.print()" class="btn btn-secondary"><i class="bi bi-printer me-2"></i>Print</button>
    </div>
</div>

<div class="card shadow-sm">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-striped table-hover mb-0">
                <thead class="bg-primary text-white text-center">
                    <tr>
                        <th class="text-start ps-4">
                            
                            <a href="?sort=item_name&direction=desc" class="text-white text-decoration-none">Item Name</a>
                            
                        </th>
                        <th>
                            
                            <a href="?sort=opening_stock&direction=asc" class="text-white text-decoration-none">Op. Stock</a>
                            
                        </th>
                        <th>
                            
                            <a href="?sort=purchase_qty&direction=asc" class="text-white text-decoration-none">Purchase Qty</a>
                            
                        </th>
                        <th>
                            
                            <a href="?sort=sale_qty&direction=asc" class="text-white text-decoration-none">Sale Qty</a>
                            
                        </th>
                        <th>
                            
                            <a href="?sort=closing_stock&direction=asc" class="text-white text-decoration-none">Closing Stock</a>
                            
                        </th>
                    </tr>
                </thead>
                <tbody class="text-center">
                    
                    <tr>
                        <td colspan="5" class="text-center p-4 text-muted">No items found.</td>
                    </tr>
                    
                </tbody>
            </table>
        </div>
    </div>
</div>

    </div>

    <!-- Footer -->
    <footer class="text-center text-muted small mt-5 mb-3">
        &copy; 2026 BMS Project. All rights reserved.
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Auto-Initialize Bootstrap Toasts -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var toastElList = [].slice.call(document.querySelectorAll('.toast'));
            var toastList = toastElList.map(function(toastEl) {
                return new bootstrap.Toast(toastEl);
            });
            toastList.forEach(toast => toast.show());
        });
    </script>

    <!-- ERP Navigation Script -->
    <script src="/static/core/js/navigation.js"></script>
    <script src="/static/core/js/base.js"></script>
    
    <!-- jQuery (Needed for Select2) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <!-- Select2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    
    <!-- Global Select2 Initialization -->
    <script src="/static/core/js/select2-init.js"></script>
    
    <!-- Keyboard Shortcuts -->
    <script>
        document.addEventListener("keydown", function(event){
            if(event.altKey){
                switch(event.key.toLowerCase()){
                    case "n":
                        window.location.href="/sale/entry/";
                        break;
                    case "p":
                        window.location.href="/party/add/";
                        break;
                    case "m":
                        event.preventDefault();
                        Array.from(document.querySelectorAll('.dropdown-toggle')).find(el => el.textContent.trim() === 'Master').click();
                        break;
                    case "t":
                        event.preventDefault();
                        Array.from(document.querySelectorAll('.dropdown-toggle')).find(el => el.textContent.trim() === 'Transactions').click();
                        break;
                    case "r":
                        event.preventDefault();
                        Array.from(document.querySelectorAll('.dropdown-toggle')).find(el => el.textContent.trim() === 'Reports').click();
                        break;
                }
            }

            if(event.ctrlKey && event.key.toLowerCase() === "k"){
                event.preventDefault();
                document.querySelector("input[name='q']").focus();
            }
        });
    </script>
</body>
</html>
