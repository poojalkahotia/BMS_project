{% extends 'base.html' %}
{% load static %}

{% block content %}
<!-- Full viewport height wrapper centered horizontally and vertically -->
<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    
    <div class="card shadow-lg border-0 login-card p-4">
        <!-- Logo Header -->
        <div class="text-center mb-4">
            <div class="d-inline-flex align-items-center justify-content-center bg-navbar text-warning rounded-circle shadow-sm" style="width: 70px; height: 70px;">
                <i class="bi bi-box-seam-fill" style="font-size: 2.5rem;"></i>
            </div>
            <h4 class="fw-bold mt-3 mb-1 text-dark" style="letter-spacing: 1px;">BMS Login</h4>
            <p class="text-muted small">Professional Inventory & Billing System</p>
        </div>

        <!-- Form -->
        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="username" class="form-label fw-bold small text-secondary">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-person-fill text-muted"></i></span>
                    <input type="text" class="form-control border-start-0" id="username" name="username" required autofocus placeholder="Enter your username">
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label fw-bold small text-secondary">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock-fill text-muted"></i></span>
                    <input type="password" class="form-control border-start-0" id="password" name="password" required placeholder="Enter your password">
                </div>
            </div>

            <div class="d-grid mb-3">
                <button type="submit" class="btn btn-primary fw-bold py-2 shadow-sm bg-form-header border-0">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
